name: SAE Tucuman Notifications Bot

on:
  schedule:
    # 8:00 AM Argentina = 11:00 UTC
    # 11:00 AM Argentina = 14:00 UTC
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch: # Permite ejecutar la tarea manualmente desde la web de GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-python: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Chromium Browser
      run: |
        playwright install chromium

    - name: Run Scraper
      env:
        TZ: 'America/Argentina/Tucuman'
        SAE_CUIL: ${{ secrets.SAE_CUIL }}
        SAE_PASSWORD: ${{ secrets.SAE_PASSWORD }}
        WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        SEND_ON_NO_NOVELTY: ${{ secrets.SEND_ON_NO_NOVELTY || 'True' }}
        NOTIFICATION_URL: 'https://portaldelsae.justucuman.gov.ar/casillero'
      run: |
        # Determinar el trigger horario según la hora actual en UTC
        # UTC 11 = 8 AM Argentina -> Ejecutar con '--time 8'
        # UTC 14 = 11 AM Argentina -> Ejecutar con '--time 11'
        HOUR=$(date +%H)
        if [ "$HOUR" -eq 11 ]; then
          python sae_checker.py --time 8
        elif [ "$HOUR" -eq 14 ]; then
          python sae_checker.py --time 11
        else
          # Ejecución manual (workflow_dispatch)
          python sae_checker.py
        fi
